<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D@UREN Radio</title>

<style>
body{
    margin:0;
    background:#111827;
    color:#fff;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.player{
    width:420px;
    background:#1f2937;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 25px rgba(255,0,60,.4);
}

.logo{
    width:160px;
    height:160px;
    border-radius:50%;
    margin:auto;
    background:#e11d48;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    font-weight:bold;
}

button{
    margin-top:25px;
    width:180px;
    height:50px;
    border:none;
    border-radius:50px;
    background:#e11d48;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#f43f5e;
}

input[type=range]{
    width:100%;
    margin-top:20px;
}

.status{
    margin-top:15px;
    color:#22c55e;
}
</style>

</head>
<body>

<div class="player">

<div class="logo">
D@UREN
</div>

<h2>D@UREN Radio</h2>

<button id="playBtn">▶ Play</button>

<br>

<input id="volume" type="range" min="0" max="100" value="80">

<div class="status" id="status">
Stopped
</div>

</div>

<audio id="radio">
    <source src="https://fire.doscast.com:8050/stream/;" type="audio/mpeg">
</audio>

<script>

const radio=document.getElementById("radio");
const btn=document.getElementById("playBtn");
const volume=document.getElementById("volume");
const status=document.getElementById("status");

radio.volume=0.8;

btn.onclick=function(){

if(radio.paused){

radio.play();

btn.innerHTML="⏸ Stop";

status.innerHTML="LIVE";

}else{

radio.pause();

btn.innerHTML="▶ Play";

status.innerHTML="Stopped";

}

}

volume.oninput=function(){

radio.volume=this.value/100;

}

</script>

</body>
</html>
